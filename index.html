<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест виджета BPMSoft</title>
    
    <!-- Стили виджета -->
    <link rel="stylesheet" href="https://bpmsoft-oc-widget1.cloudbpm.ru/3.2/widget.css">
    
    <style>
        /* ========== ФОН СТРАНИЦЫ ========== */
        body {
    /* Фон страницы */
    background: url('bg.jpg') no-repeat center top fixed;
    /* Цвет подложки на случай, если картинка не загрузится или кончится */
    background-color: #e9ecef;
    /* Фон будет подстраиваться под ширину экрана (не более 100%) */
    background-size: 100% auto;
}

        /* ========== ЦВЕТА ВИДЖЕТА (раскомментируйте для изменений) ========== */
        /*
        #bpmsoftoccchat-container .bpmsoftoccchat-conversation-body-profile {
            background: #4d1965 !important;
        }

        div#bpmsoftoccchat-main-feed {
            background-color: #f5f5f5 !important;
        }

        .bpmsoftoccchat-comment {
            background: #ffffff !important;
        }

        .bpmsoftoccchat-widget-startbutton {
            background: #F9763D !important;
        }

        .bpmsoftoccchat-send-button {
            background: #F9763D !important;
        }

        .bpmsoftoccchat-comment p {
            color: #333333 !important;
        }
        */
    </style>
</head>
<body>

    <div id="bpmsoftocc-chat"></div>

    <!-- Настройки виджета -->
    <script> 
        window.bpmsoftoccconfig = {};
        
        // Основные настройки
        window.bpmsoftoccconfig.channelId = '43e03ab5-ac40-4082-81bf-3a8c15003522';
        window.bpmsoftoccconfig.connectorUrl = 'https://bpmsoft-oc-connector1.cloudbpm.ru';
        window.bpmsoftoccconfig.title = 'DemoPresl';
        
        // Идентификатор клиента
        window.bpmsoftoccconfig.clientId = 'DemoUser-123';
        document.cookie = `bpmsoftocc:${window.bpmsoftoccconfig.channelId.toUpperCase()}=${window.bpmsoftoccconfig.clientId}`;
        
        // Время хранения сессии
        window.bpmsoftoccconfig.cookieSessionTime = 3000000;
        
        // Выбор каналов
        window.bpmsoftoccconfig.showChannelPanel = true;
        window.bpmsoftoccconfig.channelPanelHeader = 'Выберите канал для продолжения общения';
        window.bpmsoftoccconfig.backToChannelChooseCaption = 'Вернуться к списку каналов';
        window.bpmsoftoccconfig.channelsInPanel = [
            { type: "widget", name: "Продолжить на сайте" },
            { type: "telegram", name: "Telegram", link: "" },
            { type: "whatsapp", name: "WhatsApp", link: "" }
        ];
        
        // Надписи
        window.bpmsoftoccconfig.chatMessagePlaceholder = 'Введите сообщение...';
        window.bpmsoftoccconfig.closeChatCaption = 'Свернуть';
        window.bpmsoftoccconfig.chatButtonsPlaceholder = 'Выберите один из вариантов';
        window.bpmsoftoccconfig.initialMessageText = 'Клиент открыл чат';
    </script>

    <!-- Скрипты виджета -->
    <script src="https://bpmsoft-oc-widget1.cloudbpm.ru/3.2/widget.js" async></script>
    <script src="https://bpmsoft-oc-widget1.cloudbpm.ru/3.2/chunk-vendors.js" async></script>

</body>
</html>
